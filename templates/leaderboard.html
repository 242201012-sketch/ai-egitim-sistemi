<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Liderlik Tablosu</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

<style>

.board{
    max-width:900px;
    margin:auto;
    padding:40px;
}

.user-card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.rank{
    font-size:25px;
    color:#38bdf8;
}

</style>

</head>
<body>

<div class="board">

    <h1>Liderlik Tablosu</h1>

    {% for user in users %}

    <div class="user-card">

        <div>

            <h2>{{ user[0] }}</h2>

        </div>

        <div class="rank">

            {{ user[1] }} Puan

        </div>

    </div>

    {% endfor %}

</div>

</body>
</html>
