<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Giriş Yap</h2>

<form method="POST">

        name="username"

        type="password"
        name="password"

        Giriş Yap

    </button>

</form>

</body>
</html>
