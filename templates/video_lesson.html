<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Dersler</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            padding:40px;
        }

        .video-card{
            background:#1e293b;
            padding:20px;
            border-radius:15px;
            margin-bottom:30px;
        }

        iframe{
            width:100%;
            height:400px;
            border:none;
            border-radius:12px;
        }

    </style>

</head>
<body>

    <h1>🎥 Video Dersler</h1>

    {% for video in videos %}

    <div class="video-card">

        <h2>{{ video.title }}</h2>

        <iframe
            src="{{ video.url }}"
            allowfullscreen>
        </iframe>

    </div>

    {% endfor %}

</body>
</html>
