<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Video Dersler</title>
</head>
<body>

<h1>🎥 Video Dersleri</h1>

{% for video in videos %}

<h2>{{ video.title }}</h2>

<iframe width="560"
        height="315"
        src="{{ video.url }}"
        frameborder="0"
        allowfullscreen>
</iframe>

<hr>

{% endfor %}

</body>
</html>
