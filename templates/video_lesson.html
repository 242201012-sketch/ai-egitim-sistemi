<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Video Dersler</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

<style>

.video-container{
    max-width:1200px;
    margin:auto;
    padding:40px;
}

.video-card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-bottom:30px;
}

iframe{
    width:100%;
    height:400px;
    border:none;
    border-radius:15px;
}

</style>

</head>
<body>

<div class="video-container">

    <h1>Video Dersler</h1>

    {% for video in videos %}

    <div class="video-card">

        <h2>{{ video.title }}</h2>

        <iframe src="{{ video.url }}"
                allowfullscreen>
        </iframe>

    </div>

    {% endfor %}

</div>

</body>
</html>
