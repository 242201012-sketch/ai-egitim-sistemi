<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Dersler</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>🎥 Video Dersler</h1>

        {% for video in videos %}
        <div class="card">
            <h2>{{ video.title }}</h2>

            <iframe width="560"
                    height="315"
                    src="{{ video.url }}"
                    frameborder="0"
                    allowfullscreen>
            </iframe>

        </div>
        {% endfor %}

        <br>
        <a href="/student_dashboard">⬅ Geri Dön</a>
    </div>

</body>
</html>
