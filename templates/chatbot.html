<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AI Eğitim Asistanı</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

<style>

.chat-container{
    max-width:800px;
    margin:auto;
    padding:30px;
}

.chat-box{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    min-height:400px;
    margin-bottom:20px;
    overflow-y:auto;
}

.message{
    margin-bottom:15px;
    padding:15px;
    border-radius:10px;
}

.user{
    background:#2563eb;
}

.bot{
    background:#334155;
}

.input-area{
    display:flex;
    gap:10px;
}

.input-area input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:10px;
}

.input-area button{
    padding:15px 25px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
}

</style>

</head>
<body>

<div class="chat-container">

    <h1>AI Eğitim Asistanı</h1>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            Merhaba 👋 Sana derslerde yardımcı olabilirim.
        </div>

    </div>

    <div class="input-area">

        <label for="message"></label><input type="text"
                                            id="message"
                                            placeholder="Bir soru sor...">

        <button onclick="sendMessage()">
            Gönder
        </button>

    </div>

</div>

<script>

async function sendMessage(){

    let messageInput = document.getElementById("message");
    let message = messageInput.value;

    if(message.trim() === ""){
        return;
    }

    let chatBox = document.getElementById("chatBox");

    chatBox.innerHTML += `
        <div class="message user">
            ${message}
        </div>
    `;

    let formData = new FormData();
    formData.append("message", message);

    let response = await fetch("/ask", {
        method:"POST",
        body:formData
    });

    let botReply = await response.text();

    chatBox.innerHTML += `
        <div class="message bot">
            ${botReply}
        </div>
    `;

    messageInput.value = "";

    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
